<svg xmlns="http://www.w3.org/2000/svg" width="560" height="260" viewBox="0 0 560 260">
  <defs>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="cloud2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="rainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="560" height="260" rx="24" fill="#0c1a2e"/>

  <!-- Sun rays -->
  <g transform="translate(130, 110)" opacity="0.9">
    <line x1="0" y1="-50" x2="0" y2="-40" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="0" y2="50" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="-50" y1="0" x2="-40" y2="0" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="0" x2="50" y2="0" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="-35" y1="-35" x2="-28" y2="-28" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28" y1="28" x2="35" y2="35" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28" y1="-28" x2="35" y2="-35" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-35" y1="35" x2="-28" y2="28" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="22" fill="url(#sunGrad)"/>
    <circle cx="0" cy="0" r="17" fill="#fde68a"/>
  </g>

  <!-- Back cloud -->
  <g transform="translate(88, 108)" opacity="0.55">
    <circle cx="0"  cy="20" r="22" fill="url(#cloud2Grad)"/>
    <circle cx="30" cy="10" r="28" fill="url(#cloud2Grad)"/>
    <circle cx="65" cy="14" r="24" fill="url(#cloud2Grad)"/>
    <circle cx="92" cy="22" r="18" fill="url(#cloud2Grad)"/>
    <rect x="-10" y="20" width="112" height="28" fill="url(#cloud2Grad)"/>
  </g>

  <!-- Main cloud -->
  <circle cx="88"  cy="148" r="26" fill="url(#cloudGrad)"/>
  <circle cx="122" cy="132" r="34" fill="url(#cloudGrad)"/>
  <circle cx="166" cy="126" r="38" fill="url(#cloudGrad)"/>
  <circle cx="210" cy="134" r="30" fill="url(#cloudGrad)"/>
  <circle cx="240" cy="148" r="22" fill="url(#cloudGrad)"/>
  <rect x="74" y="146" width="180" height="36" fill="url(#cloudGrad)"/>

  <!-- Rain drops -->
  <g fill="url(#rainGrad)">
    <rect x="90"  y="190" width="3" height="14" rx="2"/>
    <rect x="106" y="198" width="3" height="12" rx="2"/>
    <rect x="122" y="192" width="3" height="16" rx="2"/>
    <rect x="138" y="201" width="3" height="11" rx="2"/>
    <rect x="154" y="190" width="3" height="14" rx="2"/>
    <rect x="170" y="196" width="3" height="13" rx="2"/>
    <rect x="186" y="191" width="3" height="15" rx="2"/>
    <rect x="202" y="199" width="3" height="11" rx="2"/>
    <rect x="218" y="192" width="3" height="14" rx="2"/>
    <rect x="234" y="197" width="3" height="12" rx="2"/>
    <rect x="98"  y="210" width="3" height="10" rx="2" opacity="0.6"/>
    <rect x="130" y="218" width="3" height="9"  rx="2" opacity="0.5"/>
    <rect x="162" y="212" width="3" height="11" rx="2" opacity="0.6"/>
    <rect x="194" y="216" width="3" height="9"  rx="2" opacity="0.5"/>
    <rect x="222" y="210" width="3" height="10" rx="2" opacity="0.6"/>
  </g>

  <!-- App name -->
  <text x="290" y="134"
    font-family="'Syne', 'Arial Black', sans-serif"
    font-size="72" font-weight="800" letter-spacing="-3"
    fill="#f0f9ff">SKIES</text>

  <!-- Tagline -->
  <text x="292" y="162"
    font-family="'DM Sans', 'Arial', sans-serif"
    font-size="15" font-weight="400" letter-spacing="4"
    fill="#7dd3fc">WEATHER APP</text>

  <rect x="292" y="174" width="220" height="1.5" rx="1" fill="#38bdf8" opacity="0.3"/>

  <text x="292" y="198"
    font-family="'DM Sans', 'Arial', sans-serif"
    font-size="12" font-weight="300" letter-spacing="1"
    fill="#94a3b8">Real-time · OpenWeatherMap</text>

  <!-- Stars -->
  <circle cx="470" cy="45" r="2"   fill="#fbbf24" opacity="0.8"/>
  <circle cx="490" cy="58" r="1.5" fill="#7dd3fc"  opacity="0.6"/>
  <circle cx="510" cy="42" r="1.5" fill="#ffffff"  opacity="0.4"/>

  <!-- Footer credit -->
  <text x="280" y="244"
    font-family="'DM Sans', 'Arial', sans-serif"
    font-size="10.5" fill="#475569" letter-spacing="1" text-anchor="middle">
    Muhammad Ali · Junior Frontend Developer Portfolio
  </text>
</svg>
