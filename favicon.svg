<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0c1a2e"/>
  <!-- Sun -->
  <circle cx="26" cy="26" r="10" fill="#fbbf24"/>
  <!-- Sun rays -->
  <line x1="26" y1="10" x2="26" y2="14" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="38" x2="26" y2="42" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="10" y1="26" x2="14" y2="26" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38" y1="26" x2="42" y2="26" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="15" y1="15" x2="18" y2="18" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="34" y1="34" x2="37" y2="37" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="34" y1="15" x2="37" y2="12" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <!-- Cloud -->
  <circle cx="20" cy="40" r="8"  fill="white"/>
  <circle cx="30" cy="36" r="10" fill="white"/>
  <circle cx="42" cy="38" r="8"  fill="white"/>
  <rect   x="14" y="40" width="34" height="10" fill="white"/>
  <!-- Rain -->
  <rect x="19" y="52" width="2.5" height="7" rx="1.5" fill="#38bdf8" opacity="0.8"/>
  <rect x="27" y="54" width="2.5" height="6" rx="1.5" fill="#38bdf8" opacity="0.7"/>
  <rect x="35" y="52" width="2.5" height="7" rx="1.5" fill="#38bdf8" opacity="0.8"/>
  <rect x="43" y="54" width="2.5" height="6" rx="1.5" fill="#38bdf8" opacity="0.6"/>
</svg>
